<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="main-wrapper">
        
        <div class="container">
            <div class="calculator">
                <div class="theme-toggle-container">
                    <button onclick="toggleTheme()" id="theme-toggle-btn">
                        <svg class="theme-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <path d="M12 7c-2.8 0-5 2.2-5 5s2.2 5 5 5 5-2.2 5-5-2.2-5-5-5zm0-5c.6 0 1 .4 1 1v2c0 .6-.4 1-1 1s-1-.4-1-1V3c0-.6.4-1 1-1zm0 14c.6 0 1 .4 1 1v2c0 .6-.4 1-1 1s-1-.4-1-1v-2c0-.6.4-1 1-1zM3.8 4.2c.4-.4 1-.4 1.4 0l1.4 1.4c.4.4.4 1 0 1.4s-1 .4-1.4 0L3.8 5.6c-.4-.4-.4-1 0-1.4zm13.6 13.6c.4-.4 1-.4 1.4 0l1.4 1.4c.4.4.4 1 0 1.4s-1 .4-1.4 0l-1.4-1.4c-.4-.4-.4-1 0-1.4zM2 12c0-.6.4-1 1-1h2c0 .6-.4 1-1 1H3c0-.6-.4-1-1-1zm14 0c0-.6.4-1 1-1h2c0 .6-.4 1-1 1h-2c0-.6-.4-1-1-1zM5.2 17.4c.4-.4 1-.4 1.4 0l1.4 1.4c.4.4.4 1 0 1.4s-1 .4-1.4 0l-1.4-1.4c-.4-.4-.4-1 0-1.4zm13.6-13.6c.4-.4 1-.4 1.4 0l1.4 1.4c.4.4.4 1 0 1.4s-1 .4-1.4 0l-1.4-1.4c-.4-.4-.4-1 0-1.4z"/>
                        </svg>
                    </button>
                </div>

                <input type="text" id="display" readonly placeholder="0">
                
                <div class="buttons">
                    <button onclick="clearDisplay()" class="operator">C</button>
                    <button onclick="backspace()" class="operator">⌫</button>
                    <button onclick="appendValue('%')" class="operator">%</button>
                    <button onclick="appendValue('/')" class="operator">/</button>
                    
                    <button onclick="appendValue('7')">7</button>
                    <button onclick="appendValue('8')">8</button>
                    <button onclick="appendValue('9')">9</button>
                    <button onclick="appendValue('*')" class="operator">x</button>
                    
                    <button onclick="appendValue('4')">4</button>
                    <button onclick="appendValue('5')">5</button>
                    <button onclick="appendValue('6')">6</button>
                    <button onclick="appendValue('-')" class="operator">-</button>
                    
                    <button onclick="appendValue('1')">1</button>
                    <button onclick="appendValue('2')">2</button>
                    <button onclick="appendValue('3')">3</button>
                    <button onclick="appendValue('+')" class="operator">+</button>
                    
                    <button onclick="appendValue('0')" class="zero">0</button>
                    <button onclick="appendValue('.')">.</button>
                    <button onclick="calculate()" class="equal">=</button>
                </div>
            </div>

            <div class="history-card">
                <h3>📜 Riwayat Hitung</h3>
                <ul id="history-list">
                    <li class="empty">Belum ada riwayat</li>
                </ul>
                <button onclick="clearHistory()" class="clear-history-btn">Hapus Riwayat</button>
            </div>
        </div> 
        
        <div class="definition-card">
            <p><strong>Apa itu Kalkulator?</strong><br>Kalkulator adalah sebuah alat hitung elektronik yang diciptakan untuk memproses operasi aritmatika secara instan, cepat, dan akurat tanpa risiko salah hitung manual.</p>
        </div>
        
    </div> 
        
    <footer class="credit-footer">
        Dibuat dengan bantuan 
        <svg class="gemini-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 2c.3 0 .5.2.6.5l2.1 5.1 5.1 2.1c.3.1.5.3.5.6s-.2.5-.5.6l-5.1 2.1-2.1 5.1c-.1.3-.3.5-.6.5s-.5-.2-.6-.5l-2.1-5.1-5.1-2.1A.7.7 0 0 1 2 11c0-.3.2-.5.5-.6l5.1-2.1 2.1-5.1c.1-.3.3-.5.6-.5Z"/>
        </svg> 
        Gemini
    </footer>

    <script src="script.js"></script>
</body>
</html>
